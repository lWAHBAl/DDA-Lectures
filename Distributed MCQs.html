<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDA - MCQs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --card: #1b1f2b;
    --border: #252a38;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #3ecf8e;
    --red: #f76e6e;
    --text: #e4e8f0;
    --muted: #7a8199;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body.light-mode {
    --bg: #f7f9fc;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #dbe2ef;
    --accent: #2f6de0;
    --accent2: #5e72e4;
    --green: #1f9d66;
    --red: #d94b4b;
    --text: #0f172a;
    --muted: #5f6b85;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 60px;
  }
  body.no-scroll { overflow: hidden; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0f1320 0%, #161c2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  body.light-mode header {
    background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 18px; font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
  }
  .theme-toggle {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: 1px solid rgba(255, 255, 255, 0.35);
    color: #ffffff;
    border-radius: 10px;
    padding: 9px 14px;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(47, 109, 224, 0.35);
    transition: transform 0.18s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }
  .theme-toggle:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(47, 109, 224, 0.45);
    opacity: 0.95;
  }

  /* CONTROLS */
  .controls {
    max-width: 860px;
    margin: 36px auto 0;
    padding: 0 24px;
  }
  .controls label {
    display: block;
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .select-wrap {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 420px;
  }
  .select-wrap::after {
    content: '\25BE';
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
    font-size: 14px;
  }
  select {
    width: 100%;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 44px 13px 18px;
    font-family: var(--sans);
    font-size: 0.95rem;
    appearance: none;
    cursor: pointer;
    transition: border-color 0.2s;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  /* QUIZ META */
  .quiz-meta {
    max-width: 860px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .quiz-meta.visible { display: flex; }
  .quiz-meta .count {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .quiz-meta .count span { color: var(--accent); font-weight: 600; }
  .score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .score-badge b { color: var(--green); }
  .reset-answers-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .reset-answers-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,0.08);
  }

  /* QUESTIONS */
  .quiz-area {
    max-width: 860px;
    margin: 20px auto 0;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .written-section {
    max-width: 860px;
    margin: 14px auto 0;
    padding: 0 24px;
    display: none;
  }
  .written-section.visible { display: block; }
  .written-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .written-card h3 {
    font-size: 1rem;
    margin-bottom: 8px;
  }
  .written-card p {
    font-size: 0.92rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .written-card .subhead {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin: 14px 0 8px;
    text-transform: uppercase;
  }
  .written-card img {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #0d0f14;
  }
  .written-image-wrap {
    position: relative;
  }
  .fullview-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(10, 14, 24, 0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .fullview-btn:hover {
    transform: translateY(-1px);
    background: rgba(18, 24, 38, 0.95);
    border-color: rgba(255, 255, 255, 0.45);
  }
  .fullview-icon {
    width: 14px;
    height: 14px;
    border: 2px solid #ffffff;
    border-radius: 50%;
    position: relative;
    display: inline-block;
    box-sizing: border-box;
  }
  .fullview-icon::after {
    content: '';
    position: absolute;
    width: 7px;
    height: 2px;
    background: #ffffff;
    border-radius: 1px;
    right: -5px;
    bottom: -2px;
    transform: rotate(45deg);
  }
  body.light-mode .fullview-btn {
    background: rgba(255, 255, 255, 0.93);
    border-color: #c9d4ea;
  }
  body.light-mode .fullview-icon,
  body.light-mode .fullview-icon::after {
    border-color: #20407a;
    background: #20407a;
  }

  .image-viewer {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 14, 0.88);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1200;
    padding: 24px;
  }
  .image-viewer.visible { display: flex; }
  .image-viewer img {
    max-width: min(94vw, 1400px);
    max-height: 88vh;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: #0d0f14;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  }
  .viewer-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    background: rgba(20, 24, 33, 0.9);
    color: #ffffff;
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
  }
  .written-answer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }
  .written-answer-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.25s;
  }
  .q-card:hover { border-color: #2e3549; }
  body.light-mode .q-card:hover { border-color: var(--border); }

  .q-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .q-num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    color: #fff;
    margin-top: 1px;
  }
  .q-text {
    font-size: 0.97rem;
    line-height: 1.6;
    font-weight: 500;
  }

  .q-options {
    padding: 14px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 16px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.9rem;
    line-height: 1.5;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) {
    background: #1f2438;
    border-color: var(--accent);
  }
  body.light-mode .opt-btn:hover:not(:disabled) {
    background: #e8efff;
    border-color: var(--accent);
    color: #102247;
  }
  body.light-mode .opt-btn:hover:not(:disabled) .opt-letter {
    background: #d5def3;
    color: #294a88;
  }
  .opt-btn:disabled { cursor: default; }
  .opt-letter {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
  }

  /* States */
  .opt-btn.correct {
    background: rgba(62,207,142,0.08);
    border-color: var(--green);
  }
  .opt-btn.correct .opt-letter {
    background: var(--green);
    color: #0d1a12;
  }
  .opt-btn.wrong {
    background: rgba(247,110,110,0.08);
    border-color: var(--red);
  }
  .opt-btn.wrong .opt-letter {
    background: var(--red);
    color: #1a0a0a;
  }
  .opt-btn.reveal-correct {
    background: rgba(62,207,142,0.05);
    border-color: rgba(62,207,142,0.4);
  }
  .opt-btn.reveal-correct .opt-letter {
    background: rgba(62,207,142,0.3);
    color: var(--green);
  }

  /* Answer reveal */
  .answer-area {
    display: none;
    margin: 0 22px 16px;
    padding: 12px 16px;
    background: rgba(79,142,247,0.06);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 9px;
    font-size: 0.85rem;
    line-height: 1.55;
    color: #9fb8f5;
  }
  .answer-area.visible { display: block; }
  .answer-area strong { color: var(--accent); }

  /* FINISH BANNER */
  .finish-banner {
    max-width: 860px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: none;
  }
  .finish-banner.visible { display: block; }
  .finish-inner {
    background: linear-gradient(135deg, #1a2040, #1a1630);
    border: 1px solid var(--accent2);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
  }
  .finish-inner h2 { font-size: 1.4rem; margin-bottom: 8px; }
  .finish-inner p { color: var(--muted); font-size: 0.9rem; }
  .final-score {
    font-family: var(--mono);
    font-size: 2.8rem;
    font-weight: 600;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 14px 0 10px;
  }
  .restart-btn {
    margin-top: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    padding: 12px 32px;
    color: #fff;
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .restart-btn:hover { opacity: 0.85; }

  /* Progress bar */
  .progress-bar-wrap {
    max-width: 860px;
    margin: 16px auto 0;
    padding: 0 24px;
    display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
    width: 0%;
  }

  @media (max-width: 600px) {
    header { padding: 20px 20px 16px; }
    .controls, .quiz-area, .quiz-meta, .progress-bar-wrap, .finish-banner, .written-section { padding: 0 14px; }
    .q-text { font-size: 0.93rem; }
    .written-answer-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">DDA</div>
  <div>
    <h1>Distributed Data Analytics - MCQs</h1>
  </div>
  <div class="header-actions">
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light and dark mode">&#127769; Dark Mode</button>
  </div>
</header>

<div class="controls">
  <label>Select Lecture</label>
  <div class="select-wrap">
    <select id="lectureSelect" onchange="loadLecture()">
      <option value="">- Choose a lecture -</option>
      <option value="lecture1">Lecture 1</option>
      <option value="lecture2">Lecture 2</option>
      <option value="lecture3">Lecture 3</option>
      <option value="lecture4">Lecture 4</option>
      <option value="lecture5">Lecture 5</option>
    </select>
  </div>
</div>

<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
</div>

<div class="quiz-meta" id="quizMeta">
  <div class="count">Questions: <span id="totalQ">0</span></div>
  <div class="score-badge">Score: <b id="liveScore">0</b> / <span id="liveTot">0</span></div>
  <button class="reset-answers-btn" onclick="resetAnswers()">Reset Answers</button>
</div>

<div class="quiz-area" id="quizArea"></div>
<div class="written-section" id="writtenSection"></div>
<div class="finish-banner" id="finishBanner">
  <div class="finish-inner">
    <h2>Quiz Complete</h2>
    <div class="final-score" id="finalScore">-</div>
    <p id="finalMsg"></p>
    <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
  </div>
</div>

<script>
const LECTURES = {
  lecture1: {
    title: "Lecture 1 - Motivation and Data Analytics Foundations",
    questions: [
      { q: "If CPU clock speeds have stalled while transistor counts continue to rise, how must software development change to improve performance?", opts: ["By increasing the efficiency of single-threaded code execution.", "By shifting toward solving tasks through parallel computing.", "By reducing the number of variables used within the code.", "By waiting for hardware manufacturers to resume clock speed growth."], ans: 1, exp: "Correct answer: B" },
      { q: "Why is the free lunch of automatic software speedup from newer processors considered over?", opts: ["Because new processors are no longer being manufactured for consumers.", "Because increasing transistor counts no longer improves any performance.", "Because clock speeds no longer increase automatically with each generation.", "Because programming languages have become too complex for modern CPUs."], ans: 2, exp: "Correct answer: C" },
      { q: "What is the defining characteristic of distributed work as described in the lecture?", opts: ["Running multiple threads on a single high-powered processor core.", "Utilizing a single supercomputer that contains one massive CPU.", "Distributing tasks across physically isolated compute nodes.", "Sharing a single memory bank among several local applications."], ans: 2, exp: "Correct answer: C" },
      { q: "According to Moore law, what happens to integrated circuits approximately every two years?", opts: ["The physical size of the computer chip is reduced by exactly half.", "The number of transistors within the integrated circuit doubles.", "The speed of the internal clock is doubled to handle more data.", "The cost of manufacturing the processor becomes twice as high."], ans: 1, exp: "Correct answer: B" },
      { q: "How do distributed systems allow developers to surpass the limitations of Moore law?", opts: ["They allow for the creation of chips with infinite transistor density.", "They allow for building systems with any number of transistors now.", "They eliminate the need for transistors in modern computing tasks.", "They increase the speed of light to allow faster node communication."], ans: 1, exp: "Correct answer: B" },
      { q: "Amdahl law suggests that the speedup of a parallel program is primarily limited by what?", opts: ["The total number of processors available in the distributed cluster.", "The physical distance between the different compute nodes used.", "The fraction of the program that must remain strictly sequential.", "The amount of electricity required to power the distributed system."], ans: 2, exp: "Correct answer: C" },
      { q: "If 95 percent of an algorithm can be parallelized, why does adding more processors eventually yield diminishing returns?", opts: ["Because the 5 percent sequential portion becomes the absolute bottleneck.", "Because the processors begin to interfere with each other memory.", "Because the cost of adding processors exceeds the value of the data.", "Because the software cannot handle more than a few dozen nodes."], ans: 0, exp: "Correct answer: A" },
      { q: "Why are the top 10 supercomputers in the world exclusively distributed systems?", opts: ["Because distributed systems are easier to build than single machines.", "Because they represent the only way to scale to millions of cores.", "Because single-node systems are no longer legal for scientific use.", "Because distributed systems do not require any cooling or power."], ans: 1, exp: "Correct answer: B" },
      { q: "What does the use of commodity hardware (like Cubieboards) for Hadoop clusters demonstrate?", opts: ["That distributed analytics requires the most expensive hardware available.", "That distributed software can be effective even on low-cost clusters.", "That small-scale clusters are more powerful than large supercomputers.", "That Hadoop only runs on hardware designed for hobbyist developers."], ans: 1, exp: "Correct answer: B" },
      { q: "How does the power wall relate to the shift toward distributed computing?", opts: ["It makes it impossible to run more than one computer node at a time.", "It limits how fast a single chip can run due to heat and energy.", "It refers to the physical wall where supercomputers are installed.", "It is a security feature that prevents data from leaving a cluster."], ans: 1, exp: "Correct answer: B" },
      { q: "Which of the following best defines the extracting information goal of data analytics?", opts: ["Deleting old data to make room for new incoming information.", "Finding structural, explicit, or implicit information from data.", "Converting all qualitative data into simple numerical sequences.", "Storing as much raw data as possible without ever processing it."], ans: 1, exp: "Correct answer: B" },
      { q: "In the clinic example, why is qualitative data needed if numerical data already shows medication issues?", opts: ["Because numerical data is often considered inaccurate by physicians.", "Because the numbers show what is happening, but not why.", "Because qualitative data is faster for a computer to process.", "Because numerical data cannot be stored in a distributed system."], ans: 1, exp: "Correct answer: B" },
      { q: "What is the primary focus of descriptive analysis?", opts: ["Making predictions about what will happen in the next year.", "Summarizing or describing a specific set of existing data.", "Proving that one variable caused a change in another variable.", "Estimating the effects of a policy before it is implemented."], ans: 1, exp: "Correct answer: B" },
      { q: "If a researcher uses a small sample to make a statement about a whole population, they are performing:", opts: ["Causal analysis.", "Predictive analysis.", "Inferential analysis.", "Descriptive analysis."], ans: 2, exp: "Correct answer: C" },
      { q: "Which type of analysis is specifically designed to find patterns for future forecasting?", opts: ["Causal analysis.", "Predictive analysis.", "Inferential analysis.", "Descriptive analysis."], ans: 1, exp: "Correct answer: B" },
      { q: "How does causal analysis differ from a simple correlation?", opts: ["It only looks at historical data without any current variables.", "It focuses on finding the actual cause behind a relationship.", "It is used only for public health and never for business data.", "It requires less data than any other type of analysis method."], ans: 1, exp: "Correct answer: B" },
      { q: "A study comparing a city health before and after a new law is an example of:", opts: ["Descriptive analysis.", "Difference-in-differences analysis.", "Inferential analysis.", "Structural analysis."], ans: 1, exp: "Correct answer: B" },
      { q: "Why is data analysis described as a purpose-driven activity?", opts: ["Because it is only done to make a computer work at full capacity.", "Because it must be performed in light of specific questions.", "Because every analysis must use every available piece of data.", "Because the software determines the purpose of the research."], ans: 1, exp: "Correct answer: B" },
      { q: "Which of the following is an example of categorical qualitative data?", opts: ["The age of a patient in years.", "The blood pressure of a patient.", "The occupation of a patient.", "The heart rate of a patient."], ans: 2, exp: "Correct answer: C" },
      { q: "What is a major driving force behind the 11.3 percent annual growth of the data analytics market?", opts: ["The decrease in the amount of data created globally.", "The massive increase in data volumes from sensors and media.", "The fact that single-core processors are becoming faster.", "The decision to stop using open-source software tools."], ans: 1, exp: "Correct answer: B" },
      { q: "How has the availability of IaaS and PaaS influenced distributed data analytics?", opts: ["It has made computation resources more available for everyone.", "It has made it harder to access the internet for data tasks.", "It has forced all companies to build their own hardware.", "It has eliminated the need for any data mining algorithms."], ans: 0, exp: "Correct answer: A" },

  lecture4: {
    title: "Lecture 4 - Global State, Election, and Mutual Exclusion",
    questions: [
      { q: "What does a global state represent in a distributed system?", opts: ["The sum of all local variables in active processes.", "The local states of processes and messages in transit.", "The physical timestamp of the most recent transmission.", "The total number of active nodes in the local network."], ans: 1, exp: "Correct answer: B" },
      { q: "Which of the following is considered a stable predicate?", opts: ["A specific process reaching a CPU usage of 90%.", "The system being in a state of deadlock.", "A temporary spike in network message frequency.", "The current value of a counter in a user interface."], ans: 1, exp: "Correct answer: B" },
      { q: "The Safety property in distributed systems guarantees that:", opts: ["Something good will eventually happen for all users.", "Nothing bad will ever happen during the execution.", "The system will recover from any physical hardware failure.", "All messages will be delivered in under one millisecond."], ans: 1, exp: "Correct answer: B" },
      { q: "What is the definition of a garbage object in a distributed system?", opts: ["An object that has been stored in memory for too long.", "An object with no references in processes or messages.", "A file that has been marked for deletion by the user.", "A message that was sent to a process that has crashed."], ans: 1, exp: "Correct answer: B" },
      { q: "Why is it wrong to detect termination by only checking if processes are passive?", opts: ["Passive processes might still be using high CPU power.", "An activation message might still be in transit.", "Passive processes are not allowed to send heartbeats.", "The master node may not be able to reach them."], ans: 1, exp: "Correct answer: B" },
      { q: "What is a primary problem with using synchronized clocks for global snapshots?", opts: ["Most servers do not have internal clocks for tracking.", "Clock synchronization can only be approximate.", "Messages in transit are deleted during synchronization.", "The process of syncing clocks consumes all bandwidth."], ans: 1, exp: "Correct answer: B" },
      { q: "The Chandy-Lamport algorithm assumes that communication channels are:", opts: ["Faster than the processing speed of the local nodes.", "Reliable and follow a First-In-First-Out (FIFO) order.", "Only capable of sending one single message at a time.", "Managed by a central coordinator at every network step."], ans: 1, exp: "Correct answer: B" },
      { q: "In the Chandy-Lamport algorithm, what is the purpose of a marker?", opts: ["To choose which process will become the next leader.", "To separate messages included or excluded from a snapshot.", "To tell a process to stop its execution and restart.", "To measure the exact round-trip time between nodes."], ans: 1, exp: "Correct answer: B" },
      { q: "According to the Marker Receipt Rule, if Pi receives a marker on channel c for the first time:", opts: ["It ignores the marker and continues its normal tasks.", "It records its state and marks channel c as empty.", "It sends a request for time to the central coordinator.", "It deletes all messages currently in its incoming buffer."], ans: 1, exp: "Correct answer: B" },
      { q: "If Pi has already recorded its state and receives a marker on channel c:", opts: ["It resets its local state to match the incoming marker.", "It records the state of c as the messages received since saving.", "It immediately stops the snapshot algorithm for the system.", "It forwards the marker to every node except the sender."], ans: 1, exp: "Correct answer: B" },
      { q: "When does the Chandy-Lamport algorithm terminate for a specific process?", opts: ["When it receives a finish message from the initiator.", "When it has received a marker on all incoming channels.", "When it has sent its local state to every other process.", "When its local filesystem has confirmed the state is saved."], ans: 1, exp: "Correct answer: B" },
      { q: "The Chandy-Lamport algorithm assumes strong connectivity, meaning:", opts: ["Every process is physically connected to a central hub.", "There is at least one path between every process pair.", "Messages are delivered in less than ten microseconds.", "No process in the system is allowed to ever fail."], ans: 1, exp: "Correct answer: B" },
      { q: "In the snapshot algorithm, how are in-transit messages accounted for?", opts: ["They are discarded to ensure the local state is clean.", "They are treated as part of the state of the channel.", "They are returned to the sender to be sent again later.", "They are averaged together into a single global value."], ans: 1, exp: "Correct answer: B" },
      { q: "What is the primary goal of an election algorithm?", opts: ["To distribute a large task equally among all processes.", "To choose a unique process to act as a coordinator.", "To allow users to vote on which software version to run.", "To ensure that every process has the exact same ID number."], ans: 1, exp: "Correct answer: B" },
      { q: "In distributed elections, which process is traditionally chosen as the leader?", opts: ["The process that has been active for the longest time.", "The non-crashed process with the largest unique ID.", "The process that currently has the lowest CPU workload.", "The process that is physically closest to the master router."], ans: 1, exp: "Correct answer: B" },

      { q: "In multi-leader conflict resolution, why is the merge strategy used?", opts: ["To automatically discard the older value to save space.", "To preserve both values by concatenating or ordering them.", "To force the user to manually pick the correct value.", "To ensure that the leader with the highest ID is always right."], ans: 1, exp: "Correct answer: B" },
      { q: "A conflict in a multi-leader setup is detected by checking:", opts: ["If the leader node is currently reachable by followers.", "If the current value matches the old value in the change log.", "Whether the write was synchronous or asynchronous.", "If the replication lag is currently under one second."], ans: 1, exp: "Correct answer: B" },
      { q: "Multi-leader replication is generally more complex than single-leader because:", opts: ["It requires more hardware to store the same amount of data.", "Conflict resolution is inherently asynchronous and non-trivial.", "Followers cannot serve read queries in multi-leader setups.", "It cannot support more than two datacenters at a time."], ans: 1, exp: "Correct answer: B" },
      { q: "What defines the leaderless replication approach ?", opts: ["Clients only write to a single primary replica manager.", "All replicas are equivalent and can accept write queries.", "A hidden leader is elected every time a write occurs.", "Writes are only successful if every node in the cluster responds."], ans: 1, exp: "Correct answer: B" },
      { q: "In a leaderless system with n nodes, a write is successful if acknowledged by w nodes, and a read queries r nodes. To guarantee the newest version is seen, what condition must be met?", opts: ["w + r < n", "w + r = n", "w + r > n", "w = r = n"], ans: 2, exp: "Correct answer: C" },
      { q: "In leaderless replication, if a read returns multiple versions of the same data, how is the correct value determined?", opts: ["The system takes a majority vote among the values.", "The value with the highest version number is chosen.", "The system always prefers the value from the first responder.", "The read fails and the client must retry the write."], ans: 1, exp: "Correct answer: B" },
      { q: "What is read-repair in the context of leaderless replication?", opts: ["The client fixes the data on the leader after a failed write.", "Stale replicas are updated when a client detects a version mismatch.", "The database shuts down to repair corrupted disk sectors.", "Replicas periodically ping each other to check for data drift."], ans: 1, exp: "Correct answer: B" },
      { q: "Which pitfall is unique to leaderless replication when timestamps are used for conflict resolution?", opts: ["Replication lag causing stale reads.", "Clock skew causing older writes to overwrite newer ones.", "The leader node becoming a bottleneck for write queries.", "The split brain problem between two competing leaders."], ans: 1, exp: "Correct answer: B" },
      { q: "Why is strict consistency considered impossible to implement in a distributed system?", opts: ["It requires all processes to have perfectly synchronized local clocks.", "It assumes that message propagation across the network is instantaneous.", "It only allows one replica manager to exist in the entire system.", "It depends on the CAP theorem being false for all configurations."], ans: 1, exp: "Correct answer: B" },
      { q: "Linearizability requires that the execution of operations is consistent with:", opts: ["The order in which the client program issued them only.", "The real times at which the operations actually occurred.", "The alphabetical order of the data keys being accessed.", "The sequence numbers provided by a central sync manager."], ans: 1, exp: "Correct answer: B" },
      { q: "What is the key difference between sequential consistency and linearizability?", opts: ["Sequential consistency does not require a real-time ordering.", "Linearizability allows different processes to see different orders.", "Sequential consistency is much stricter than linearizability.", "Linearizability does not care about the program order of clients."], ans: 0, exp: "Correct answer: A" },
      { q: "In a sequentially consistent store, all processes must agree on:", opts: ["The exact microsecond each operation was performed globally.", "The same interleaving of operations, regardless of the order.", "That writes from different processes are always seen immediately.", "That only the most recent write is ever visible to any process."], ans: 1, exp: "Correct answer: B" },
      { q: "Causal consistency ensures that:", opts: ["All writes are seen in the same order by every process.", "Potentially related writes are seen in the same order by all.", "Concurrent writes must be seen in the same order everywhere.", "Only the process that issued the write can ever read it back."], ans: 1, exp: "Correct answer: B" },
      { q: "In causal consistency, if Process A writes x and Process B reads x then writes y:", opts: ["All processes must see the write of x before the write of y.", "The writes of x and y are considered concurrent.", "Process B write is unrelated to Process A write.", "The system must use a global clock to order these events."], ans: 0, exp: "Correct answer: A" },
      { q: "FIFO consistency (PRAM) guarantees that:", opts: ["All processes see all writes in the exact same global order.", "Writes from a single process are seen in the order they were issued.", "Writes from different processes are always ordered by arrival time.", "A process must wait for a write to finish before issuing another."], ans: 1, exp: "Correct answer: B" },
      { q: "Under FIFO consistency, if P1 writes a then b, and P2 writes c then d, which sequence is NOT allowed?", opts: ["a, c, b, d", "c, a, d, b", "b, a, c, d", "a, b, c, d"], ans: 2, exp: "Correct answer: C" },
      { q: "What is the role of a synchronization variable in weak consistency?", opts: ["It encrypts the data being sent between different replicas.", "It acts as a flush that forces all previous writes to complete.", "It identifies which leader is currently active in the cluster.", "It automatically resolves conflicts using a last write wins rule."], ans: 1, exp: "Correct answer: B" },
      { q: "A front end in the architectural model for replication is responsible for:", opts: ["Storing the physical copies of the logical data objects.", "Making replication transparent by handling client requests.", "Managing the physical hardware of the replica managers.", "Electing a new leader when the primary node crashes."], ans: 1, exp: "Correct answer: B" },
      { q: "In single-leader replication, if the leader fails, what is the first step of failover?", opts: ["Elect a new leader immediately.", "Determine that the leader has actually failed (for example, via timeout).", "Reconfigure all clients to use a different database.", "Replay the replication log from the beginning of time."], ans: 1, exp: "Correct answer: B" },
      { q: "Why might an operations team prefer manual failover over automatic failover?", opts: ["Automatic failover is physically impossible in most networks.", "Manual failover is always faster than automated scripts.", "To prevent risky decisions made by the system during load spikes.", "Because humans can replay replication logs more accurately."], ans: 2, exp: "Correct answer: C" },
      { q: "In one-copy serializability, the system behavior should be identical to:", opts: ["A system with n replicas performing n tasks at once.", "A non-replicated system performing transactions one at a time.", "A leaderless system where every write is synchronous.", "A system where no transactions are allowed to ever fail."], ans: 1, exp: "Correct answer: B" },
      { q: "A system is linearizable but NOT strictly consistent. This is likely because:", opts: ["It uses a single global clock that is slightly out of sync.", "It cannot guarantee instantaneous visibility across distances.", "It allows concurrent writes to be seen in different orders.", "It only supports one client at a time for all operations."], ans: 1, exp: "Correct answer: B" },
      { q: "In the forest of consistency models, which model is at the top (most restrictive)?", opts: ["FIFO consistency", "Causal consistency", "Strict consistency", "Eventual consistency"], ans: 2, exp: "Correct answer: C" },
      { q: "When a follower recovers from a failure, how does it catch up with the leader?", opts: ["It requests a full copy of the entire database.", "It replays its local log and requests missing updates from the leader.", "It promotes itself to leader to get the latest writes directly.", "It waits for the next gossip round to receive all changes."], ans: 1, exp: "Correct answer: B" },
      { q: "Which model is specifically concerned with the program order of individual clients?", opts: ["Strict consistency", "Sequential consistency", "Weak consistency", "Eventual consistency"], ans: 1, exp: "Correct answer: B" },
      { q: "Why is caching NOT counted as a method for increasing availability?", opts: ["Because cache memory is more expensive than disk storage.", "Because caches do not serve as a persistent, authoritative copy.", "Because caches are only used in single-leader systems.", "Because caching only improves write speed, not read speed."], ans: 1, exp: "Correct answer: B" },
      { q: "If two operations are commutative in active replication, what optimization is possible?", opts: ["They can be executed in any order on different replicas.", "They must be executed by the leader node only.", "They can be skipped entirely to save processing power.", "They must be merged into a single logical transaction."], ans: 0, exp: "Correct answer: A" },
      { q: "In the numerical deviation metric of continuous consistency, what is measured?", opts: ["The difference in the number of replicas between two sites.", "The difference between the local value and the true global value.", "The time delay between a write and its first propagation.", "The total number of transactions currently in the WAL."], ans: 1, exp: "Correct answer: B" },
      { q: "Given P1: W(x)=a, P2: W(x)=b, P3: R(x)=b then R(x)=a, and P4: R(x)=a then R(x)=b, why is the store not sequentially consistent?", opts: ["P1 and P2 wrote at exactly the same physical time", "P3 and P4 do not observe the same global order", "P3 read b before P1 finished writing a", "P4 failed to read NIL before reading a"], ans: 1, exp: "Correct answer: B" },
      { q: "In P1: W(x)=a; P2: R(x)=a then W(x)=b; P3: R(x)=b then R(x)=a, which consistency model is violated because effect appears before cause?", opts: ["FIFO (PRAM) Consistency", "Sequential Consistency", "Causal Consistency", "Weak Consistency"], ans: 2, exp: "Correct answer: C" },
      { q: "In FIFO (PRAM), if P1 performs W(x)=a then W(x)=b, what must other processes observe?", opts: ["They must see a before b from P1", "They must see both at the same physical timestamp", "They must agree on P1 writes relative to P2 writes", "They must block all reads until b is applied everywhere"], ans: 0, exp: "Correct answer: A" },
    ]
  }
};

let answered = 0;
let correct = 0;
let total = 0;
let currentLecture = null;
const lectureProgress = {};

function shuffleAllQuestionOptions() {
  Object.values(LECTURES).forEach((lecture) => {
    lecture.questions.forEach((q) => {
      if (!Array.isArray(q.opts) || q.opts.length < 2) return;
      if (typeof q.ans !== 'number' || q.ans < 0 || q.ans >= q.opts.length) return;

      const indexed = q.opts.map((opt, idx) => ({ opt, idx }));

      // Fisher-Yates shuffle to avoid fixed answer-position patterns.
      for (let i = indexed.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
      }

      q.opts = indexed.map((entry) => entry.opt);
      q.ans = indexed.findIndex((entry) => entry.idx === q.ans);
    });
  });
}

shuffleAllQuestionOptions();

function loadLecture() {
  const key = document.getElementById('lectureSelect').value;
  if (!key) {
    currentLecture = null;
    document.getElementById('quizArea').innerHTML = '';
    document.getElementById('writtenSection').innerHTML = '';
    document.getElementById('writtenSection').classList.remove('visible');
    document.getElementById('quizMeta').classList.remove('visible');
    document.getElementById('progressWrap').classList.remove('visible');
    document.getElementById('finishBanner').classList.remove('visible');
    return;
  }
  currentLecture = key;
  answered = 0; correct = 0;
  const data = LECTURES[key];
  total = data.questions.length;
  if (!Array.isArray(lectureProgress[key])) {
    lectureProgress[key] = Array(total).fill(null);
  } else if (lectureProgress[key].length !== total) {
    lectureProgress[key] = Array(total).fill(null);
  }

  document.getElementById('totalQ').textContent = total;
  document.getElementById('liveScore').textContent = 0;
  document.getElementById('liveTot').textContent = total;
  document.getElementById('quizMeta').classList.add('visible');
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('finishBanner').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';

  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  data.questions.forEach((q, i) => {
    area.appendChild(buildCard(q, i));
  });

  restoreLectureProgress(key, data);
  renderWrittenSection(data);
}

function renderAnswerState(qIdx, chosen, correct_idx, numOpts) {
  for (let i = 0; i < numOpts; i++) {
    const btn = document.getElementById(`opt-${qIdx}-${i}`);
    btn.disabled = true;
    if (i === correct_idx) btn.classList.add(chosen === correct_idx ? 'correct' : 'reveal-correct');
    if (i === chosen && chosen !== correct_idx) btn.classList.add('wrong');
    if (i === chosen && chosen === correct_idx) btn.classList.add('correct');
  }
}

function restoreLectureProgress(key, data) {
  const saved = lectureProgress[key];
  if (!Array.isArray(saved)) return;

  let restoredAnswered = 0;
  let restoredCorrect = 0;

  saved.forEach((chosen, qIdx) => {
    if (!Number.isInteger(chosen)) return;
    const q = data.questions[qIdx];
    if (!q) return;
    renderAnswerState(qIdx, chosen, q.ans, q.opts.length);
    restoredAnswered++;
    if (chosen === q.ans) restoredCorrect++;
  });

  answered = restoredAnswered;
  correct = restoredCorrect;
  document.getElementById('liveScore').textContent = correct;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  if (answered === total && total > 0) {
    document.getElementById('finishBanner').classList.add('visible');
  }
}

function renderWrittenSection(data) {
  const section = document.getElementById('writtenSection');
  section.innerHTML = '';

  if (!data.written) {
    section.classList.remove('visible');
    return;
  }

  const card = document.createElement('div');
  card.className = 'written-card';
  card.innerHTML = `
    <p>${data.written.prompt}</p>
    <div class="subhead">Diagram</div>
    <div class="written-image-wrap">
      <img src="${data.written.diagram}" alt="Written question diagram" />
      <button class="fullview-btn" data-full-src="${data.written.diagram}" data-full-alt="Written question diagram" aria-label="Open full view">
        <span class="fullview-icon" aria-hidden="true"></span>
      </button>
    </div>
    <div class="written-answer-grid">
      <div class="written-answer-col">
        <div class="subhead">Answer (Lamport)</div>
        <div class="written-image-wrap">
          <img src="${data.written.lamportAnswer}" alt="Lamport clocks answer" />
          <button class="fullview-btn" data-full-src="${data.written.lamportAnswer}" data-full-alt="Lamport clocks answer" aria-label="Open full view">
            <span class="fullview-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <div class="written-answer-col">
        <div class="subhead">Answer (Vector)</div>
        <div class="written-image-wrap">
          <img src="${data.written.vectorAnswer}" alt="Vector clocks answer" />
          <button class="fullview-btn" data-full-src="${data.written.vectorAnswer}" data-full-alt="Vector clocks answer" aria-label="Open full view">
            <span class="fullview-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  `;

  attachFullViewHandlers(card);

  section.appendChild(card);
  section.classList.add('visible');
}

function ensureImageViewer() {
  let viewer = document.getElementById('imageViewer');
  if (viewer) return viewer;

  viewer = document.createElement('div');
  viewer.id = 'imageViewer';
  viewer.className = 'image-viewer';
  viewer.innerHTML = `
    <button class="viewer-close" type="button" aria-label="Close full view">x</button>
    <img id="imageViewerImg" alt="Full view" />
  `;

  viewer.addEventListener('click', (event) => {
    if (event.target === viewer || event.target.classList.contains('viewer-close')) {
      closeImageViewer();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') closeImageViewer();
  });

  document.body.appendChild(viewer);
  return viewer;
}

function openImageViewer(src, altText) {
  const viewer = ensureImageViewer();
  const img = document.getElementById('imageViewerImg');
  if (!img) return;
  img.src = src;
  img.alt = altText || 'Full view';
  viewer.classList.add('visible');
  document.body.classList.add('no-scroll');
}

function closeImageViewer() {
  const viewer = document.getElementById('imageViewer');
  if (!viewer) return;
  viewer.classList.remove('visible');
  document.body.classList.remove('no-scroll');
}

function attachFullViewHandlers(container) {
  container.querySelectorAll('.fullview-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const src = btn.getAttribute('data-full-src') || '';
      const alt = btn.getAttribute('data-full-alt') || 'Full view';
      openImageViewer(src, alt);
    });
  });
}

function buildCard(q, idx) {
  const letters = ['A','B','C','D','E'];
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${idx}`;

  const normalizeChoiceText = (text) => String(text).replace(/[\.:]+\s*$/, '');

  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `<div class="q-num">${idx+1}</div><div class="q-text">${q.q}</div>`;

  const opts = document.createElement('div');
  opts.className = 'q-options';
  q.opts.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.id = `opt-${idx}-${oi}`;
    btn.innerHTML = `<span class="opt-letter">${letters[oi]}</span><span>${normalizeChoiceText(opt)}</span>`;
    btn.onclick = () => selectAnswer(idx, oi, q.ans, q.exp, q.opts.length);
    opts.appendChild(btn);
  });

  card.appendChild(header);
  card.appendChild(opts);
  return card;
}

function selectAnswer(qIdx, chosen, correct_idx, explanation, numOpts) {
  if (!currentLecture) return;
  if (!Array.isArray(lectureProgress[currentLecture])) {
    lectureProgress[currentLecture] = Array(total).fill(null);
  }
  if (Number.isInteger(lectureProgress[currentLecture][qIdx])) return;

  lectureProgress[currentLecture][qIdx] = chosen;
  renderAnswerState(qIdx, chosen, correct_idx, numOpts);

  answered++;
  if (chosen === correct_idx) correct++;
  document.getElementById('liveScore').textContent = correct;

  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  if (answered === total) {
    setTimeout(showFinish, 500);
  }
}

function showFinish() {
  const pct = Math.round((correct / total) * 100);
  document.getElementById('finalScore').textContent = `${correct} / ${total}`;
  let msg = '';
  if (pct === 100) msg = 'Perfect score! Outstanding mastery of distributed systems.';
  else if (pct >= 80) msg = 'Excellent work! Strong conceptual understanding.';
  else if (pct >= 60) msg = 'Good effort - review the explanations to reinforce weak areas.';
  else msg = 'Keep studying - go through the lecture and try again!';
  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('finishBanner').classList.add('visible');
  document.getElementById('finishBanner').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  loadLecture();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAnswers() {
  if (!currentLecture) return;
  delete lectureProgress[currentLecture];
  loadLecture();
}

function applyTheme(mode) {
  const isLight = mode === 'light';
  document.body.classList.toggle('light-mode', isLight);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.innerHTML = isLight ? '&#9728; Light Mode' : '&#127769; Dark Mode';
}

function toggleTheme() {
  const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
  localStorage.setItem('quiz-theme', next);
  applyTheme(next);
}

function initTheme() {
  const saved = localStorage.getItem('quiz-theme');
  if (saved === 'light' || saved === 'dark') {
    applyTheme(saved);
    return;
  }
  const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  applyTheme(prefersLight ? 'light' : 'dark');
}

initTheme();
